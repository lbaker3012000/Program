<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bridge</title>
<style>
:root{
  --bg:#0d0d0f;--bg2:#17171a;--bg3:#202024;--bg4:#2a2a2f;
  --border:#2c2c32;--border2:#3a3a42;
  --text:#f0f0f3;--text2:#8e8e9e;--text3:#4a4a58;
  --blue:#5b9ef9;--blue-bg:#0c1e3a;--blue-dim:#0f2040;--blue-text:#8bbfff;
  --green:#4caf50;--green-bg:#0f2210;--green-text:#7ed081;
  --amber:#f0a500;--amber-bg:#291c03;--amber-text:#fbbf24;
  --red-bg:#280c0c;--red-text:#f87171;
  --pink-bg:#220d1a;--pink-text:#f0a0c8;
  --gray-bg:#202024;--gray-text:#7878a0;
  --teal-bg:#081e18;--teal-text:#4ecfa0;
  --r:14px;--rsm:9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:16px;line-height:1.5;min-height:100vh}
body{padding:0 0 120px}

.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 18px 14px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.app-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.app-sub{font-size:13px;color:var(--text2);margin-top:3px}
.countdown{display:inline-block;background:var(--amber-bg);color:var(--amber-text);font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;margin-top:8px}
.hdr-gl{text-align:right;flex-shrink:0}
.gl-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:3px}
.gl-val{font-size:22px;font-weight:800;color:var(--blue-text);letter-spacing:-0.5px}
.gl-sub{font-size:11px;color:var(--text2);margin-top:1px}

.tm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 18px}
.tm-card{background:var(--bg2);border-radius:var(--rsm);padding:13px 14px;border:1px solid var(--border)}
.tm-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;font-weight:600}
.tm-val{font-size:24px;font-weight:800;letter-spacing:-0.6px}
.tm-unit{font-size:13px;color:var(--text2);margin-left:2px;font-weight:400}
.tm-div{border-top:1px solid var(--border);margin-top:10px;padding-top:8px}
.tm-sub-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.tm-sub-val{font-size:16px;font-weight:700;color:var(--text2);letter-spacing:-0.3px}

.sec-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;font-weight:700;padding:0 18px 8px}
.sched{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:0 18px 20px}
.sday{border-radius:var(--rsm);padding:9px 4px;text-align:center}
.sd-d{font-size:10px;font-weight:700;margin-bottom:4px;opacity:0.75}
.sd-n{font-size:11px;font-weight:700;line-height:1.3}
.sd-s{font-size:9px;margin-top:3px;opacity:0.6;line-height:1.3}

.bwrap{padding:0 18px;margin-bottom:10px}
.bbadge{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px;margin-bottom:10px}
.ba{background:var(--blue-bg);color:var(--blue-text)}
.bi{background:var(--green-bg);color:var(--green-text)}
.bp{background:var(--amber-bg);color:var(--amber-text)}
.bd{background:var(--bg3);color:var(--gray-text)}
.wscroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.wscroll::-webkit-scrollbar{display:none}
.wcard{flex-shrink:0;width:112px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 12px;cursor:pointer;transition:all 0.15s}
.wcard.sel{border-color:var(--blue);background:var(--blue-dim)}
.wcard.deload{opacity:0.5}
.wcard.capped{border-color:var(--amber)}
.wk-n{font-size:11px;color:var(--text3);font-weight:700}
.wk-t{font-size:13px;font-weight:700;margin-top:3px;line-height:1.3}
.wk-rpe{font-size:11px;color:var(--text2);margin-top:3px}
.wk-dt{font-size:10px;color:var(--text3);margin-top:4px}
.wk-cap{font-size:10px;color:var(--amber-text);margin-top:3px;font-weight:700}

.sarea{padding:14px 18px 0}
.pnote{background:var(--bg3);padding:13px 16px;font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px;border-left:3px solid var(--blue);border-radius:0 var(--rsm) var(--rsm) 0}

.vol-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px}
.vol-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;font-weight:700;margin-bottom:12px}
.vol-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.vol-row:last-child{margin-bottom:0}
.vol-name{width:62px;font-size:13px;color:var(--text2);flex-shrink:0}
.vol-bg{flex:1;background:var(--bg4);border-radius:4px;height:8px;overflow:hidden}
.vol-fill{height:100%;border-radius:4px}
.vol-val{font-size:13px;font-weight:700;width:32px;text-align:right}

.dtabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.dtabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;font-size:14px;padding:9px 18px;border-radius:24px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;font-weight:600}
.dtab.act{background:var(--blue-dim);color:var(--blue-text);border-color:var(--blue)}

.scard{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.shead{display:flex;align-items:center;gap:12px;padding:15px 17px;border-bottom:1px solid var(--border)}
.sic{width:42px;height:42px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.sname{font-size:16px;font-weight:800;letter-spacing:-0.3px}
.ssub{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}

.exrow{padding:15px 17px;border-bottom:1px solid var(--border)}
.exrow:last-child{border-bottom:none}
.exrow.bo{background:rgba(255,255,255,0.02);padding-left:28px}
.extop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:11px}
.exname{font-size:15px;font-weight:700;line-height:1.3;flex:1;letter-spacing:-0.1px}
.exname.dim{font-weight:400;color:var(--text2);font-size:14px}
.extags{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.tc{background:var(--blue-bg);color:var(--blue-text)}
.tv{background:var(--pink-bg);color:var(--pink-text)}
.ta{background:var(--gray-bg);color:var(--gray-text)}
.tr{background:var(--teal-bg);color:var(--teal-text)}
.ts{background:var(--bg4);color:var(--text3)}
.rpetag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.rlo{background:var(--green-bg);color:var(--green-text)}
.rmd{background:var(--amber-bg);color:var(--amber-text)}
.rhi{background:var(--red-bg);color:var(--red-text)}
.exdet{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.exd{background:var(--bg3);border-radius:var(--rsm);padding:11px 12px}
.exdl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;font-weight:700}
.exdv{font-size:17px;font-weight:800;line-height:1.2;letter-spacing:-0.4px}
.exdp{font-size:11px;color:var(--text2);margin-top:3px}
.exnote{font-size:13px;color:var(--text2);line-height:1.65}

.dlcard{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);padding:24px 20px;margin-bottom:14px}
.dltitle{font-size:19px;font-weight:800;margin-bottom:8px;letter-spacing:-0.4px}
.dlsub{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.dllist{list-style:none}
.dllist li{padding:10px 0;font-size:14px;border-bottom:1px solid var(--border);color:var(--text2);line-height:1.6}
.dllist li:last-child{border-bottom:none}
.dllist strong{color:var(--text);font-weight:700}

.snote{font-size:13px;color:var(--text2);background:var(--bg3);border-radius:0 var(--rsm) var(--rsm) 0;padding:12px 15px;margin-top:10px;line-height:1.65;border-left:3px solid var(--border2)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="app-title">Bridge</div>
      <div class="app-sub">93kg · SQ 240 / BP 180 / DL 270</div>
      <div class="countdown" id="cd">...</div>
    </div>
    <div class="hdr-gl">
      <div class="gl-lbl">Target GL</div>
      <div class="gl-val">94.2</div>
      <div class="gl-sub">720kg total</div>
    </div>
  </div>
</div>

<div class="tm-grid">
  <div class="tm-card">
    <div class="tm-lbl">Squat TM</div>
    <div class="tm-val">240<span class="tm-unit">kg</span></div>
    <div class="tm-div">
      <div class="tm-sub-lbl">Pause squat</div>
      <div class="tm-sub-val">215<span class="tm-unit">kg</span></div>
    </div>
  </div>
  <div class="tm-card">
    <div class="tm-lbl">Bench TM</div>
    <div class="tm-val">180<span class="tm-unit">kg</span></div>
    <div class="tm-div">
      <div class="tm-sub-lbl">Close-grip</div>
      <div class="tm-sub-val">170<span class="tm-unit">kg</span></div>
    </div>
  </div>
  <div class="tm-card">
    <div class="tm-lbl">Deadlift TM</div>
    <div class="tm-val">270<span class="tm-unit">kg</span></div>
    <div class="tm-div">
      <div class="tm-sub-lbl">Deficit DL</div>
      <div class="tm-sub-val">255<span class="tm-unit">kg</span></div>
    </div>
  </div>
</div>

<div class="sec-lbl">Weekly schedule</div>
<div class="sched" id="sched"></div>
<div id="blocks"></div>
<div class="sarea" id="main"></div>

<script>
const TM={sq:240,bp:180,dl:270,cg:170,ps:215,dd:255};
function kg(l,p){return Math.round(TM[l]*p/2.5)*2.5}
function bo(l,p){return Math.round(TM[l]*p*0.90/2.5)*2.5}

(function(){
  const d=Math.ceil((new Date('2026-07-26')-new Date())/864e5);
  document.getElementById('cd').textContent=d>0?`${d} days to competition`:'Competition day!';
})();

const SCHED=[
  {d:'Mon',n:'Day 1',s:'Squat',bg:'#0c1e3a',tc:'#8bbfff',tr:1},
  {d:'Tue',n:'Day 2',s:'Bench',bg:'#0f2210',tc:'#7ed081',tr:1},
  {d:'Wed',n:'Rest',s:'Recovery',bg:'#17171a',tc:'#4a4a58',tr:0},
  {d:'Thu',n:'Day 3',s:'Deadlift',bg:'#291c03',tc:'#fbbf24',tr:1},
  {d:'Fri',n:'Day 4',s:'Sq var',bg:'#220d1a',tc:'#f0a0c8',tr:1},
  {d:'Sat',n:'Day 5',s:'Bench var',bg:'#1a1a1e',tc:'#7878a0',tr:1},
  {d:'Sun',n:'Rest',s:'Recovery',bg:'#17171a',tc:'#4a4a58',tr:0}
];
document.getElementById('sched').innerHTML=SCHED.map(s=>
  `<div class="sday" style="background:${s.bg}">
    <div class="sd-d" style="color:${s.tc}">${s.d}</div>
    <div class="sd-n" style="color:${s.tc}">${s.n}</div>
    <div class="sd-s" style="color:${s.tc}">${s.s}</div>
  </div>`
).join('');

const WEEKS=[
  {n:'Wk 1',dt:'12–18 Apr',ty:'Accumulation',rpe:'RPE 7–7.5',ph:0,wi:0,dl:0},
  {n:'Wk 2',dt:'19–25 Apr',ty:'Accumulation',rpe:'RPE 7.5–8',ph:0,wi:1,dl:0},
  {n:'Wk 3',dt:'26 Apr–2 May',ty:'Accumulation+',rpe:'RPE 8–8.5',ph:0,wi:2,dl:0},
  {n:'Wk 4',dt:'3–9 May',ty:'Overreach',rpe:'RPE 8–8.5',ph:0,wi:3,dl:0,cap:1},
  {n:'Wk 5',dt:'10–16 May',ty:'Deload I',rpe:'RPE 5–6',ph:-1,wi:0,dl:1},
  {n:'Wk 6',dt:'17–23 May',ty:'Intensification',rpe:'RPE 7.5–8.5',ph:1,wi:0,dl:0},
  {n:'Wk 7',dt:'24–30 May',ty:'Intensification',rpe:'RPE 8–9',ph:1,wi:1,dl:0},
  {n:'Wk 8',dt:'31 May–6 Jun',ty:'Intensification+',rpe:'RPE 8.5–9',ph:1,wi:2,dl:0},
  {n:'Wk 9',dt:'7–13 Jun',ty:'Overreach',rpe:'RPE 8.5',ph:1,wi:3,dl:0,cap:1},
  {n:'Wk 10',dt:'14–20 Jun',ty:'Deload II',rpe:'RPE 5–6',ph:-1,wi:0,dl:1},
  {n:'Wk 11',dt:'21–27 Jun',ty:'Peaking',rpe:'RPE 8–8.5',ph:2,wi:0,dl:0},
  {n:'Wk 12',dt:'28 Jun–4 Jul',ty:'Peaking+',rpe:'RPE 8.5–9',ph:2,wi:1,dl:0},
  {n:'Wk 13',dt:'5–11 Jul',ty:'Peak intensity',rpe:'RPE 9–9.5',ph:2,wi:2,dl:0},
  {n:'Wk 14',dt:'12–18 Jul',ty:'Opener prep',rpe:'RPE 7.5–8',ph:2,wi:3,dl:0},
  {n:'Wk 15',dt:'19–25 Jul',ty:'Taper',rpe:'RPE 5–6',ph:-1,wi:0,dl:1,taper:1}
];
const BGROUPS=[
  {lb:'Block 1 — Accumulation',wks:[0,1,2,3],cl:'ba'},
  {lb:'Deload I',wks:[4],cl:'bd'},
  {lb:'Block 2 — Intensification',wks:[5,6,7,8],cl:'bi'},
  {lb:'Deload II',wks:[9],cl:'bd'},
  {lb:'Block 3 — Peaking',wks:[10,11,12,13],cl:'bp'},
  {lb:'Taper',wks:[14],cl:'bd'}
];
const DAYS=[
  {n:'Day 1',name:'Squat primary',ic:'S1',bg:'#0c1e3a',tc:'#8bbfff'},
  {n:'Day 2',name:'Bench primary',ic:'B1',bg:'#0f2210',tc:'#7ed081'},
  {n:'Day 3',name:'Deadlift primary',ic:'D1',bg:'#291c03',tc:'#fbbf24'},
  {n:'Day 4',name:'Squat var + hypertrophy',ic:'S2',bg:'#220d1a',tc:'#f0a0c8'},
  {n:'Day 5',name:'Bench var + lower hyp',ic:'B2',bg:'#1a1a1e',tc:'#7878a0'}
];

function cpct(ph,wi){return[{0:[.70,.73,.76],1:[.73,.76,.78],2:[.76,.78,.81],3:[.79,.82,.85]},{0:[.78,.81,.84],1:[.81,.84,.86],2:[.84,.86,.89],3:[.84,.86,.89]},{0:[.84,.87,.90],1:[.87,.90,.93],2:[.90,.93,.95],3:[.92,.92,.92]}][ph][wi]}
function vpct(ph,wi){return[{0:[.68,.71,.74],1:[.71,.74,.76],2:[.74,.76,.79],3:[.77,.80,.83]},{0:[.76,.79,.82],1:[.79,.82,.84],2:[.82,.84,.87],3:[.85,.87,.90]},{0:[.82,.85,.88],1:[.85,.88,.91],2:[.88,.91,.93],3:[.91,.93,.95]}][ph][wi]}
function csr(ph,wi){return[{0:[5,5],1:[5,5],2:[4,5],3:[3,5]},{0:[4,4],1:[4,4],2:[3,4],3:[2,4]},{0:[3,3],1:[3,3],2:[2,3],3:[1,1]}][ph][wi]}
function vsr(ph,wi){return[{0:[4,4],1:[4,4],2:[3,4],3:[3,3]},{0:[4,3],1:[3,3],2:[3,3],3:[2,3]},{0:[3,3],1:[3,2],2:[2,2],3:[1,2]}][ph][wi]}
function grpe(ph,wi){
  const b=[{0:[7,7.5],1:[7.5,8],2:[8,8.5],3:[8.5,9]},{0:[7.5,8],1:[8,8.5],2:[8.5,9],3:[9,9.5]},{0:[8,8.5],1:[8.5,9],2:[9,9.5],3:[7.5,7.5]}][ph][wi];
  if(ph===0&&wi===3)return[8,8.5];
  if(ph===1&&wi===3)return[8.5,8.5];
  return b;
}
function aS(ph,wi){if(ph===0)return 3;if(ph===1)return wi>=2?2:3;return wi>=2?1:2}
function rC(r){if(!r)return'rlo';if(r>=9)return'rhi';if(r>=8)return'rmd';return'rlo'}

function buildSess(ph,wi,di){
  const cp=cpct(ph,wi),vp=vpct(ph,wi),sr=csr(ph,wi),vs=vsr(ph,wi),rpe=grpe(ph,wi),as=aS(ph,wi);
  const late=ph===2&&wi>=2,ar=ph===0?7:ph===1?7.5:8;
  const sqLo=kg('sq',cp[0]),sqHi=kg('sq',cp[2]),sqBO=bo('sq',cp[2]);
  const bpLo=kg('bp',cp[0]),bpHi=kg('bp',cp[2]),bpBO=bo('bp',cp[2]);
  const dlLo=kg('dl',cp[0]),dlHi=kg('dl',cp[2]),dlBO=bo('dl',cp[2]);
  const cgLo=kg('cg',vp[0]),cgHi=kg('cg',vp[2]);
  const psLo=kg('ps',vp[0]),psHi=kg('ps',vp[2]);
  const ddLo=kg('dd',vp[0]),ddHi=kg('dd',vp[2]);

  function cR(lift,lo,hi,boff,r,note){
    const rows=[],isOP=ph===2&&wi===3;
    if(ph===0){
      rows.push({name:`Competition ${lift}`,tag:'c',sets:sr[0],reps:sr[1],load:`${lo}–${hi}`,pct:`${Math.round(cp[0]*100)}–${Math.round(cp[2]*100)}%`,rpe:r,note:`Straight sets. Build across. ${note}`});
    } else {
      const bs=ph===1?Math.max(sr[0]-1,2):wi>=2?1:2;
      rows.push({name:`Competition ${lift}`,tag:'c',sets:1,reps:sr[1],load:hi,pct:`~${Math.round(cp[2]*100)}%`,rpe:r,note:isOP?`Opener weight ~92% TM. Should feel RPE 7.5 — fast and smooth. ${note}`:`Top set at target RPE. ${note}`});
      rows.push({name:'Backoff sets',tag:'s',sets:bs,reps:sr[1],load:boff,pct:'~90% top',rpe:Math.min(r+0.5,10),note:'Same lift. Full reset between sets.',bo:1});
    }
    return rows;
  }

  const D=[
    [...cR('squat',sqLo,sqHi,sqBO,rpe[0],'3–5 min rest. Bar speed = autoregulation.'),
     ...(!late?[{name:'Pause squat 2s',tag:'v',sets:vs[0],reps:vs[1],load:`${psLo}–${psHi}`,pct:`${Math.round(vp[0]*100)}–${Math.round(vp[2]*100)}% ps TM`,rpe:rpe[0],note:'TM=215kg. Dead stop at parallel. No bounce.'}]:[]),
     {name:'Barbell row',tag:'a',sets:as,reps:'8–10',load:'RPE 7–8',pct:'',rpe:ar,note:'Overhand. Full scapular retraction.'},
     {name:'45° back extension',tag:'a',sets:as,reps:'12–15',load:'BW / plate',pct:'',rpe:ar-0.5,note:'Erector spinae. Squeeze glutes at top.'},
     {name:'Leg curl',tag:'a',sets:as,reps:'10–12',load:'RPE 7',pct:'',rpe:ar,note:'3s eccentric.'},
     {name:'Copenhagen plank',tag:'r',sets:3,reps:'20–30s',load:'BW',pct:'',rpe:6,note:'Short lever Wks 1–4, long lever Wks 6+.'},
     {name:'Ab wheel',tag:'a',sets:2,reps:'10–15',load:'BW',pct:'',rpe:6,note:'Anti-extension core.'}],

    [...cR('bench press',bpLo,bpHi,bpBO,rpe[0],'Full arch, leg drive, lats.'),
     {name:'Chest-supported DB row',tag:'a',sets:as,reps:'10–12',load:'RPE 7–8',pct:'',rpe:ar,note:'No posterior chain. Elbows 45°. Pause at top.'},
     ...(ph<2?[{name:'Incline DB press',tag:'a',sets:as,reps:'8–10',load:'RPE 7–8',pct:'',rpe:ar,note:'Upper chest. 3s eccentric. Removed in peaking.'}]:[]),
     ...(ph<2?[{name:'Skullcrusher / JM press',tag:'a',sets:as,reps:'8–10',load:'RPE 7',pct:'',rpe:ar-0.5,note:'Mid-range tricep. Removed in peaking.'}]:[]),
     {name:'Tricep pushdown',tag:'a',sets:as,reps:'12–15',load:'RPE 6–7',pct:'',rpe:6,note:'Lockout accessory.'},
     {name:'Face pulls',tag:'a',sets:2,reps:'15–20',load:'RPE 6',pct:'',rpe:6,note:'Shoulder health. Always 2 sets.'},
     ...(ph<2?[{name:'Cable curl',tag:'a',sets:2,reps:'12',load:'RPE 6',pct:'',rpe:6,note:'Bicep tendon health.'}]:[])],

    [...cR('deadlift',dlLo,dlHi,dlBO,rpe[1],'Max 3 sets total. 5 min rest. Vertical bar path.'),
     {name:'Glute-ham raise',tag:'a',sets:as,reps:'6–10',load:'BW / assist',pct:'',rpe:ar,note:'Hip extension AND knee flex. 3s eccentric.'},
     {name:'Lat pulldown',tag:'a',sets:as,reps:'8–10',load:'RPE 7–8',pct:'',rpe:ar,note:'Lat strength for bar path control.'},
     ...(ph<2?[{name:'Seated cable row',tag:'a',sets:as,reps:'10–12',load:'RPE 7',pct:'',rpe:ar-0.5,note:'Horizontal pull. Removed in peaking.'}]:[]),
     {name:'45° back extension',tag:'a',sets:as,reps:'12–15',load:'BW / plate',pct:'',rpe:ar-0.5,note:'Second erector hit. Keep in all phases.'},
     {name:'Ab wheel',tag:'a',sets:2,reps:'10–12',load:'BW',pct:'',rpe:6,note:'Short session — leave feeling good.'}],

    [...(!late?[{name:'Deficit deadlift 5cm',tag:'v',sets:vs[0],reps:vs[1],load:`${ddLo}–${ddHi}`,pct:`${Math.round(vp[0]*100)}–${Math.round(vp[2]*100)}% dd TM`,rpe:rpe[0],note:'TM=255kg. Separated from comp DL by rest day. Dropped Wks 13–14. Reduce to 2cm if adductor discomfort.'}]:[]),
     {name:'SSB squat / hack squat',tag:'a',sets:ph<2?as+1:as,reps:ph<2?'6–8':'8–10',load:'RPE 7–8',pct:'',rpe:ar,note:'Quad hypertrophy. SSB preferred.'},
     {name:'Barbell hip thrust',tag:'a',sets:as,reps:'8–10',load:'RPE 7–8',pct:'',rpe:ar,note:'Glute hypertrophy. Minimal spinal load.'},
     {name:'Leg curl',tag:'a',sets:as,reps:'12–15',load:'RPE 7',pct:'',rpe:ar,note:'Second ham hit. Buffered from Thu DL.'},
     {name:'Copenhagen plank',tag:'r',sets:3,reps:'20–30s',load:'BW',pct:'',rpe:6,note:'Long lever from Wk 6. Hip dip variation from Wk 7.'},
     {name:'Hip adduction machine',tag:'r',sets:ph<2?3:2,reps:'12–15',load:ph<2?'Progressive':'RPE 6–7',pct:'',rpe:6,note:'3s eccentric. Progressive load Blk 1–2.'},
     {name:'Hanging knee raise',tag:'a',sets:2,reps:'12–15',load:'BW',pct:'',rpe:6,note:'Core flexion.'}],

    [{name:'Close-grip bench press',tag:'v',sets:vs[0],reps:vs[1],load:`${cgLo}–${cgHi}`,pct:`${Math.round(vp[0]*100)}–${Math.round(vp[2]*100)}% cg TM`,rpe:rpe[0],note:'TM=170kg. Tricep strength and lockout.'},
     ...(ph<2?[{name:'DB bench press',tag:'a',sets:as,reps:'10–12',load:'RPE 7–8',pct:'',rpe:ar,note:'Chest hypertrophy. Removed in peaking.'}]:[]),
     {name:'Good mornings',tag:'a',sets:as,reps:ph===2?'6–8':'8–10',load:'RPE 7',pct:'',rpe:ar,note:'Erector + hamstring. 2 days after Thu DL.'},
     ...(ph<2?[{name:'Leg press',tag:'a',sets:as,reps:'10–12',load:'RPE 7',pct:'',rpe:ar,note:'Quad volume. No axial load. Removed in peaking.'}]:[]),
     {name:'Pull-ups',tag:'a',sets:as,reps:'6–8',load:'BW / weighted',pct:'',rpe:ar,note:'Lat width. Add weight when BW easy.'},
     ...(ph<2?[{name:'Dips',tag:'a',sets:as,reps:'8–10',load:'BW / weighted',pct:'',rpe:ar-0.5,note:'Tricep + chest hypertrophy. Removed in peaking.'}]:[])
    ]
  ];
  return D[di];
}

function getVol(ph,wi){return[{0:{sq:28,bp:24,dl:16},1:{sq:32,bp:26,dl:18},2:{sq:35,bp:28,dl:20},3:{sq:38,bp:30,dl:22}},{0:{sq:22,bp:18,dl:14},1:{sq:24,bp:20,dl:16},2:{sq:26,bp:22,dl:18},3:{sq:28,bp:24,dl:20}},{0:{sq:16,bp:14,dl:10},1:{sq:14,bp:12,dl:9},2:{sq:10,bp:10,dl:6},3:{sq:8,bp:8,dl:4}}][ph][wi]}

const pN={
  0:'Accumulation — straight sets. Volume is the priority. Last set hits target RPE. Bar speed = autoregulation. Adductor rehab 3×/week. Wk 4 RPE capped at 8–8.5.',
  1:'Intensification — top set + backoff. Find your top set at target RPE, drop to 90% for backoffs. Volume moderate. Wk 9 RPE capped at 8.5.',
  2:'Peaking — every top set with competition intent. Volume drops sharply. Big accessories removed. Wk 13–14: deficit DL and pause squat dropped. Wk 14 uses opener weight (~92%).'
};
const sN={
  0:'Straight sets — work up across all sets. Last set = target RPE.',
  1:'Top set → backoff — find your top set, then drop to 90% for backoffs.',
  2:'Top single/double → minimal backoff — every rep with competition intent.'
};

// ── State persistence via localStorage ──
let selW=0,selD=0;
try{const s=JSON.parse(localStorage.getItem('bridge_v2'));if(s){if(s.w>=0&&s.w<15)selW=s.w;if(s.d>=0&&s.d<5)selD=s.d;}}catch(e){}
function save(){try{localStorage.setItem('bridge_v2',JSON.stringify({w:selW,d:selD}))}catch(e){}}

function renderBlocks(){
  document.getElementById('blocks').innerHTML=BGROUPS.map(bg=>
    `<div class="bwrap"><span class="bbadge ${bg.cl}">${bg.lb}</span>
    <div class="wscroll">
      ${bg.wks.map(wi=>{const w=WEEKS[wi];return`<div class="wcard${wi===selW?' sel':''}${w.dl?' deload':''}${w.cap?' capped':''}" onclick="sw(${wi})">
        <div class="wk-n">${w.n}</div><div class="wk-t">${w.ty}</div>
        <div class="wk-rpe">${w.rpe}</div><div class="wk-dt">${w.dt}</div>
        ${w.cap?'<div class="wk-cap">RPE capped</div>':''}
      </div>`;}).join('')}
    </div></div>`
  ).join('');
}

function renderMain(){
  const w=WEEKS[selW],el=document.getElementById('main');
  if(w.dl){
    const it=w.taper;
    el.innerHTML=`<div class="dlcard">
      <div class="dltitle">${it?'Wk 15 — Taper / Meet prep':'Deload week'}</div>
      <div class="dlsub">${it?'Fatigue cleared. Execute openers. Compete Sun 26 Jul.':'Flush fatigue. Everything should feel easy.'}</div>
      <ul class="dllist">${it
        ?`<li><strong>Mon</strong> — Squat opener ${kg('sq',0.92)}kg · 1×1 · RPE 7</li>
           <li><strong>Tue</strong> — Bench opener ${kg('bp',0.92)}kg · 1×1 · RPE 7</li>
           <li><strong>Wed</strong> — Rest</li>
           <li><strong>Thu</strong> — Deadlift opener ${kg('dl',0.92)}kg · 1×1 · RPE 7</li>
           <li><strong>Fri–Sun</strong> — Complete rest only</li>
           <li>If any opener feels above RPE 7.5 — review second attempt weight</li>
           <li>Carb load Thu–Sat · 8–9 hrs sleep every night</li>
           <li>Copenhagen plank 2×20s daily until Thu</li>`
        :`<li><strong>Squat</strong> ${kg('sq',.60)}kg · 3×5 · RPE 6 max</li>
           <li><strong>Bench</strong> ${kg('bp',.60)}kg · 3×5 · RPE 6 max</li>
           <li><strong>Deadlift</strong> ${kg('dl',.60)}kg · 2×4 · RPE 6 max</li>
           <li>Pause squat + deficit DL: 2×3 @55% of own TM, or skip</li>
           <li>GHR 2×8 BW · Back ext 2×15 BW</li>
           <li>All accessories: 2 sets, lighter load</li>
           <li>Copenhagen plank 2×20s daily</li>
           <li>Sleep, calories, soft tissue work</li>`}
      </ul></div>`;
    return;
  }
  const vol=getVol(w.ph,w.wi),mx=Math.max(vol.sq,vol.bp,vol.dl);
  let h=`<div class="pnote">${pN[w.ph]}${w.cap?` <strong style="color:var(--amber-text)">Overreach RPE capped — adductor precaution.</strong>`:''}</div>`;
  h+=`<div class="vol-wrap"><div class="vol-title">Weekly working sets — competition lifts</div>
    ${[['sq','Squat','#5b9ef9'],['bp','Bench','#4caf50'],['dl','Deadlift','#f0a500']].map(([k,n,c])=>
      `<div class="vol-row"><span class="vol-name">${n}</span><div class="vol-bg"><div class="vol-fill" style="width:${Math.round(vol[k]/mx*100)}%;background:${c}"></div></div><span class="vol-val">${vol[k]}</span></div>`
    ).join('')}</div>`;
  h+=`<div class="dtabs">${DAYS.map((d,i)=>`<button class="dtab${i===selD?' act':''}" onclick="sd(${i})">${d.n}</button>`).join('')}</div>`;
  const day=DAYS[selD],sess=buildSess(w.ph,w.wi,selD);
  h+=`<div class="scard"><div class="shead">
    <div class="sic" style="background:${day.bg};color:${day.tc}">${day.ic}</div>
    <div><div class="sname">${day.n}: ${day.name}</div><div class="ssub">${w.n} · ${w.dt} · ${w.ty} · ${w.rpe}</div></div>
  </div>`;
  const tagCls={c:'tc',v:'tv',a:'ta',r:'tr',s:'ts'};
  const tagLbl={c:'Comp',v:'Variation',a:'Accessory',r:'Rehab',s:'Backoff'};
  sess.forEach(ex=>{
    h+=`<div class="exrow${ex.bo?' bo':''}">
      <div class="extop">
        <div class="exname${ex.bo?' dim':''}">${ex.name}</div>
        <div class="extags">
          <span class="tag ${tagCls[ex.tag]||'ta'}">${tagLbl[ex.tag]||''}</span>
          ${ex.rpe?`<span class="rpetag ${rC(ex.rpe)}">${ex.rpe}</span>`:''}
        </div>
      </div>
      <div class="exdet">
        <div class="exd"><div class="exdl">Sets</div><div class="exdv">${ex.sets}</div></div>
        <div class="exd"><div class="exdl">Reps</div><div class="exdv">${ex.reps}</div></div>
        <div class="exd"><div class="exdl">Load</div><div class="exdv">${ex.load}</div><div class="exdp">${ex.pct||''}</div></div>
      </div>
      ${ex.note?`<div class="exnote">${ex.note}</div>`:''}
    </div>`;
  });
  h+=`</div><div class="snote">${sN[w.ph]}</div>`;
  el.innerHTML=h;
}

function sw(i){
  selW=i;selD=0;save();
  renderBlocks();renderMain();
  window.scrollTo({top:document.getElementById('blocks').offsetTop-70,behavior:'smooth'});
}
function sd(i){selD=i;save();renderMain()}

renderBlocks();renderMain();
</script>
</body>
</html>
